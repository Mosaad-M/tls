name: Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Run tests
        run: pixi run test
        # Note: test-connection, test-connection12, test-socket are excluded
        # from the composite task — they require local cert files and a
        # running Python TLS server. Run them manually with gen_test_certs.sh.

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1

      - name: Run tests
        run: pixi run test
